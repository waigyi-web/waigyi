<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heartopia Shop UI - Fixed</title>
    <style>
        :root { 
            --bg-red: #8b0000; 
            --card-bg: #ffffff;
            --gold: #ffcc00;
            --green-tag: #28a745;
        }
        body { 
            background: linear-gradient(180deg, #8b0000 0%, #300000 100%);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 15px; min-height: 100vh;
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            max-width: 500px;
            margin: auto;
        }
        
        .card { 
            background: var(--card-bg); 
            border-radius: 10px; 
            padding: 10px 5px; 
            text-align: center; 
            position: relative;
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .no-wait {
            position: absolute; top: 0; right: 0;
            background: var(--green-tag); color: white;
            font-size: 8px; padding: 3px 6px; border-radius: 0 10px 0 10px;
        }

        .card img { width: 45px; height: 45px; object-fit: contain; margin-top: 10px; }
        .diamond-name { font-size: 11px; font-weight: bold; color: #333; margin: 5px 0; }
        .price { color: #d00; font-weight: bold; font-size: 12px; }

        #orderModal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center;
        }

        .modal-content {
            background: white; 
            width: 85%; 
            max-width: 320px; 
            border-radius: 15px;
            padding: 20px; 
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .label-text { font-size: 12px; color: #444; font-weight: bold; margin: 10px 0 5px; display: block; }
        
        input, select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px;
            margin-bottom: 5px;
        }

        .buy-now { 
            background: var(--gold); 
            border: none; 
            width: 100%; 
            padding: 12px; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 15px; 
        }

        .buy-now:disabled { background: #ccc; cursor: not-allowed; }

        .close-x { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #999; }
    </style>
</head>
<body>

    <div class="grid" id="productGrid"></div>

    <div id="orderModal">
        <div class="modal-content">
            <span class="close-x" onclick="hidePopup()">&times;</span>
            <h3 style="text-align: center; margin-top: 0; color: #333; font-size: 18px;">Order Details</h3>
            
            <label class="label-text">Game ID</label>
            <input type="text" id="pID" placeholder="ID ရိုက်ထည့်ပါ">

            <label class="label-text">Select Server</label>
            <select id="pServer">
                <option value="" disabled selected>Server ရွေးချယ်ပါ</option>
                <option value="SEA">SEA</option>
                <option value="Asia">Asia</option>
                <option value="Global">Global</option>
                <option value="America">America</option>
                <option value="TW,HK,MO">TW,HK,MO</option>
            </select>

            <label class="label-text">ရွေးချယ်ထားသော ပမာဏ</label>
            <input type="text" id="pItem" readonly style="background: #f5f5f5; border: none; font-weight: bold; color: #d00;">

            <div style="background: #fff3cd; padding: 10px; border-radius: 8px; text-align: center; margin-top: 10px; border: 1px solid #ffeeba;">
                <small style="color: #856404;">Payment Number:</small><br>
                <strong style="font-size: 16px;">09 400503878</strong>
            </div>

            <label class="label-text">ငွေလွှဲပြေစာ (Screenshot)</label>
            <input type="file" id="pScreenshot" accept="image/*">

            <button class="buy-now" id="submitBtn" onclick="confirmOrder()">Confirm Order</button>
        </div>
    </div>

    <script>
        const products = [
            { name: "20 Diamond", price: "2700 ကျပ်" },
            { name: "60 Diamond", price: "6000 ကျပ်" },
            { name: "320 Diamond", price: "25000 ကျပ်" },
            { name: "730 Diamond", price: "52000 ကျပ်" },
            { name: "1370 Diamond", price: "95000 ကျပ်" },
            { name: "2130 Diamond", price: "143000 ကျပ်" },
            { name: "3550 Diamond", price: "240000 ကျပ်" },
            { name: "7050 Diamond", price: "458000 ကျပ်" },
            { name: "GAMG Junior", price: "3300 ကျပ်", img: "https://img.icons8.com/fluency/96/diamond-ring.png" },
            { name: "GAMG Formal", price: "16500 ကျပ်", img: "https://img.icons8.com/fluency/96/medal2.png" }
        ];

        const grid = document.getElementById('productGrid');

        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => showPopup(p.name, p.price);
            let imgURL = p.img || "https://img.icons8.com/emoji/96/gem-stone.png";

            card.innerHTML = `
                <div class="no-wait">မစောင့်ရပါ</div>
                <img src="${imgURL}">
                <div class="diamond-name">${p.name}</div>
                <div class="price">${p.price}</div>
            `;
            grid.appendChild(card);
        });

        function showPopup(name, price) {
            document.getElementById('pItem').value = name + " (" + price + ")";
            document.getElementById('orderModal').style.display = 'flex';
        }

        function hidePopup() {
            document.getElementById('orderModal').style.display = 'none';
        }

        async function confirmOrder() {
            // ပြင်ဆင်ထားသော Token နှင့် Chat ID
            const token = "8733446361:AAEFYqJv7I8FA4odz9TjPmIDV8sLoQuCQrA"; 
            const chat_id = "5925669830"; 
            const id = document.getElementById('pID').value;
            const server = document.getElementById('pServer').value;
            const item = document.getElementById('pItem').value;
            const screenshot = document.getElementById('pScreenshot').files[0];

            if(!id || !server || !screenshot) { 
                alert("⚠️ အချက်အလက်အားလုံး ပြည့်စုံအောင် ဖြည့်ပေးပါ"); 
                return; 
            }

            const btn = document.getElementById('submitBtn');
            btn.innerText = "⏳ Sending Order...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("photo", screenshot);
            formData.append("caption", `🔔 **Order အသစ် ရောက်ရှိလာပါပြီ**\n\n🎮 Game ID: ${id}\n🌐 Server: ${server}\n💎 Item: ${item}\n📅 အချိန်: ${new Date().toLocaleString()}`);

            try {
                // Telegram API သို့ တိုက်ရိုက်ပို့ခြင်း
                const response = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    alert("✅ Order တင်ခြင်း အောင်မြင်ပါသည်။ Telegram တွင် စစ်ဆေးကြည့်ပါ။");
                    hidePopup();
                    // Form Reset
                    document.getElementById('pID').value = "";
                    document.getElementById('pScreenshot').value = "";
                } else {
                    alert("❌ ပို့မရပါ။ အကြောင်းရင်း: " + result.description);
                }
            } catch (error) {
                alert("❌ အင်တာနက်လိုင်း သို့မဟုတ် Connection စစ်ဆေးပါ");
            } finally {
                btn.innerText = "Confirm Order";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
